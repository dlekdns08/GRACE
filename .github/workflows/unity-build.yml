name: Unity Build

# Tag-push auto-trigger disabled — self-hosted runner not yet provisioned.
# Manual dispatch is kept available; re-add the `tags: ["v*"]` push trigger
# once the runner is wired up.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - StandaloneOSX
          - StandaloneWindows64
          - WebGL
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: unity_env/Library
          key: Library-${{ matrix.target }}-${{ hashFiles('unity_env/Assets/**', 'unity_env/Packages/**', 'unity_env/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.target }}-
            Library-

      - name: Build (game-ci)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity_env
          targetPlatform: ${{ matrix.target }}
          buildName: grace
          allowDirtyBuild: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grace-${{ matrix.target }}
          path: build
          if-no-files-found: error
          retention-days: 14
